name: Rust CI

on:
    workflow_call:
        inputs:
            rust_toolchain:
                description: 'Rust toolchain (stable, beta, nightly)'
                required: false
                default: 'stable'
                type: string
            runner:
                description: 'Runner label (macos-latest, ubuntu-latest, etc.)'
                required: false
                default: 'macos-latest'
                type: string
            run_fmt:
                description: 'Run cargo fmt check'
                required: false
                default: true
                type: boolean
            run_clippy:
                description: 'Run cargo clippy'
                required: false
                default: true
                type: boolean
            run_tests:
                description: 'Run cargo test'
                required: false
                default: true
                type: boolean
            run_check:
                description: 'Run cargo check'
                required: false
                default: true
                type: boolean
            all_features:
                description: 'Use --all-features flag'
                required: false
                default: true
                type: boolean
            extra_args:
                description: 'Extra arguments for cargo commands'
                required: false
                default: ''
                type: string
    push:
        paths:
            - '**/*.rs'
            - '**/Cargo.toml'
            - '**/Cargo.lock'
    pull_request:
        paths:
            - '**/*.rs'
            - '**/Cargo.toml'
            - '**/Cargo.lock'

env:
    CARGO_TERM_COLOR: always
    RUSTFLAGS: '-Dwarnings'

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    ci:
        runs-on: ${{ inputs.runner || 'macos-latest' }}

