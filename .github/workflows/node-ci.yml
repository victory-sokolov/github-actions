name: Reusable Node.js CI

on:
  workflow_call:
    inputs:
      package-manager:
        description: 'Package manager to use (bun or pnpm)'
        default: 'bun'
        type: string
      upload-coverage:
        description: 'Whether to upload coverage reports'
        default: false
        type: boolean
      skip-build:
        description: 'Whether to skip the build step'
        default: true
        type: boolean
      run-tests:
        description: 'Whether to run tests when script exists'
        default: true
        type: boolean
      run-fallow:
        description: 'Whether to run fallow checks'
        default: true
        type: boolean
      run-jscpd:
        description: 'Whether to run jscpd when script exists'
        default: true
        type: boolean
      run-knip:
        description: 'Whether to run knip when script exists'
        default: true
        type: boolean
      run-audit:
        description: 'Whether to run audit when script exists'
        default: true
        type: boolean
      node-version:
        description: 'Node.js version to use'
        default: '24'
        type: string
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

