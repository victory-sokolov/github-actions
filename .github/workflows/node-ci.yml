      - name: 🛡️ Socket firewall
        uses: socketdev/action@ba6de6cc0565af1f42295590380973573297e31f # v1.3.2
        with:
          mode: firewall-free

      - name: 🔤 Spell Check with Typos
        uses: crate-ci/typos@37bb98842b0d8c4ffebdb75301a13db0267cef89 # v1.47.2
        with:
          files: "**/*.md"
        continue-on-error: true

      - name: 📄 Read .nvmrc if exists
        id: nvm
        run: |
          if [ -f .nvmrc ]; then
            echo "NODE_VERSION=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"
          else
            echo "NODE_VERSION=${{ inputs.node-version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: 📦 Setup dependencies with cache
        uses: victory-sokolov/github-actions/.github/actions/node-deps-cache@main
        with:
          package-manager: ${{ inputs.package-manager }}
          node-version: ${{ steps.nvm.outputs.NODE_VERSION }}

      - name: 📋 Display tool versions
        run: |
          curl -sfL "https://raw.githubusercontent.com/victory-sokolov/github-actions/main/.github/scripts/display-tool-versions.ts" -o /tmp/display-tool-versions.ts
          node /tmp/display-tool-versions.ts "${{ inputs.package-manager }}" "v1.44.0"

      - name: 🔍 Check available scripts
        id: scripts
        run: |
          curl -sfL "https://raw.githubusercontent.com/victory-sokolov/github-actions/main/.github/scripts/check-available-scripts.ts" -o /tmp/check-available-scripts.ts
          node --experimental-strip-types /tmp/check-available-scripts.ts

      - name: 🔍 Check for turbo.json
        id: turbo_check
        run: |
          if [ -f turbo.json ]; then
            echo "has_turbo=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_turbo=false" >> "$GITHUB_OUTPUT"
          fi
      
      - name: 🐶 Reviewdog
        uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f # v1.5.0
        with:
          reviewdog_version: latest

      - name: 🔍 Run lint
        if: steps.scripts.outputs.lint == 'true'
        run: |
          if [ "${{ steps.turbo_check.outputs.has_turbo }}" = "true" ]; then
            if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
              pnpm turbo run lint --filter=""
            else
              bunx turbo run lint --filter=""
            fi
          elif [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            pnpm lint
          else
            bun run lint
          fi

      - name: ✅ Check formatting
        if: steps.scripts.outputs.format_check == 'true'
        run: |
          if [ "${{ steps.turbo_check.outputs.has_turbo }}" = "true" ]; then
            if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
              pnpm turbo run format:check --filter=""
            else
              bunx turbo run format:check --filter=""
            fi
          elif [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            pnpm format:check
          else
            bun run format:check
          fi

      - name: 🔐 Run typecheck
        if: steps.scripts.outputs.typecheck == 'true'
