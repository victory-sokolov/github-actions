name: Reusable Node.js CI

on:
  workflow_call:
    inputs:
      package-manager:
        description: 'Package manager to use (bun or pnpm)'
        default: 'bun'
        type: string
      upload-coverage:
        description: 'Whether to upload coverage reports'
        default: false
        type: boolean
      skip-build:
        description: 'Whether to skip the build step'
        default: true
        type: boolean
      node-version:
        description: 'Node.js version to use'
        default: '24'
        type: string
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout commit
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🛡️ Socket firewall
        uses: socketdev/action@v1.3.2
        with:
          mode: firewall-free

      - name: 🔤 Spell Check with Typos
        uses: crate-ci/typos@v1.45.0
        with:
          files: "**/*.md"
        continue-on-error: true

      - name: 📄 Read .nvmrc if exists
        id: nvm
        run: |
          if [ -f .nvmrc ]; then
            echo "NODE_VERSION=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"
          else
            echo "NODE_VERSION=${{ inputs.node-version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: 📦 Setup dependencies with cache
        uses: victory-sokolov/github-actions/.github/actions/node-deps-cache@main
        with:
          package-manager: ${{ inputs.package-manager }}
          node-version: ${{ steps.nvm.outputs.NODE_VERSION }}

      - name: 📋 Display tool versions
        run: |
          curl -sfL "https://raw.githubusercontent.com/victory-sokolov/github-actions/main/.github/scripts/display-tool-versions.ts" -o /tmp/display-tool-versions.ts
          node /tmp/display-tool-versions.ts "${{ inputs.package-manager }}" "v1.44.0"

      - name: 🔍 Check available scripts
        id: scripts
        run: |
          curl -sfL "https://raw.githubusercontent.com/victory-sokolov/github-actions/main/.github/scripts/check-available-scripts.ts" -o /tmp/check-available-scripts.ts
          node --experimental-strip-types /tmp/check-available-scripts.ts

      - name: 🔍 Check for turbo.json
        id: turbo_check
        run: |
          if [ -f turbo.json ]; then
            echo "has_turbo=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_turbo=false" >> "$GITHUB_OUTPUT"
          fi
      
      - name: 🐶 Reviewdog
        uses: reviewdog/action-setup@d8edfce3dd5e1ec6978745e801f9c50b5ef80252 # v1.4.0
        with:
          reviewdog_version: latest

      - name: 🚀 Run CI tasks with Turbo
        if: steps.turbo_check.outputs.has_turbo == 'true'
        uses: victory-sokolov/github-actions/.github/actions/turbo@main
        with:
          package-manager: ${{ inputs.package-manager }}
          turbo-filter: ''
          skip-build: ${{ inputs.skip-build }}

      - name: 🚀 Run CI tasks standard
        if: steps.turbo_check.outputs.has_turbo == 'false'
        uses: victory-sokolov/github-actions/.github/actions/node-ci-tasks@main
        with:
          package-manager: ${{ inputs.package-manager }}
          skip-build: ${{ inputs.skip-build }}
