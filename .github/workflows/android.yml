name: Android CI

on:
    workflow_call:
        inputs:
            runner:
                description: 'Runner label to use for jobs (ubuntu-latest, macos-latest, windows-latest)'
                required: false
                default: 'ubuntu-latest'
                type: string
            java_version:
                description: 'Java version to use'
                required: false
                default: '21'
                type: string
            ktlint_version:
                description: 'ktlint version to download'
                required: false
                default: '1.3.1'
                type: string
    push:
        paths:
            - '**/*.kt'
            - '**/*.kts'
            - '**/build.gradle*'
            - '**/settings.gradle*'
            - '**/gradle.properties'
    pull_request:
        paths:
            - '**/*.kt'
            - '**/*.kts'
            - '**/build.gradle*'
            - '**/settings.gradle*'
            - '**/gradle.properties'

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

env:
    KTLINT_VERSION: ${{ inputs.ktlint_version || '1.3.1' }}
    KTLINT_CACHE_DIR: ${{ github.workspace }}/.ktlint-cache

jobs:
    ktlint:
        name: ktlint (style & format)
        runs-on: ${{ inputs.runner || 'ubuntu-latest' }}

