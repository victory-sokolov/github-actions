name: Lint GitHub Actions

on:
  pull_request:
    paths:
      - '.github/workflows/**.yml'
      - '.github/workflows/**.yaml'
      - '.github/actions/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install actionlint
        run: |
          wget https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash
          bash download-actionlint.bash
          rm download-actionlint.bash

      - name: Run actionlint
        run: ./actionlint

      - name: Run zizmor 🌈
        uses: zizmorcore/zizmor-action@b572f7b1a1c2d41efaab43d504f68d215c3cd727 # v0.5.4
