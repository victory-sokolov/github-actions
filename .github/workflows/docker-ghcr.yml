name: Docker Build on GHCR

on:
    workflow_call:
        inputs:
            image_name:
                required: true
                type: string
            dockerfile_path:
                required: false
                type: string
                default: ./Dockerfile
            context:
                required: false
                type: string
                default: .
            build_args:
                required: false
                type: string
            target:
                required: false
                type: string
            tags:
                required: false
                type: string
                default: ''
            platforms:
                required: false
                type: string
                default: linux/amd64,linux/arm64

        secrets:
            registry_token:
                required: false

jobs:
    build:
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
            contents: read
            packages: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Set up QEMU
              uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

            - name: Set up Docker Buildx
              id: setup-buildx
              uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

            - name: Restore Docker cache mounts
              id: cache-mounts
              uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
              with:
                  path: ${{ runner.temp }}/docker-cache-mounts
                  key: ${{ runner.os }}-docker-cache-mounts-${{ github.repository }}-${{ inputs.image_name }}-${{ inputs.target || 'default' }}-${{ inputs.platforms }}-${{ hashFiles(inputs.dockerfile_path, '**/package.json', '**/bun.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-docker-cache-mounts-${{ github.repository }}-${{ inputs.image_name }}-${{ inputs.target || 'default' }}-${{ inputs.platforms }}-
                      ${{ runner.os }}-docker-cache-mounts-${{ github.repository }}-${{ inputs.image_name }}-

            - name: Log in to GHCR
              uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  # Use the passed secret if available, otherwise fallback to GITHUB_TOKEN
                  password: ${{ secrets.registry_token || secrets.GITHUB_TOKEN }}

            - name: Prepare metadata config
              id: meta-config
              uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
              env:
                  INPUT_TAGS: ${{ inputs.tags }}
              with:
                  script: |
                      const tags = (process.env.INPUT_TAGS || '')
                        .split(/\r?\n/)
                        .map((tag) => tag.trim())
                        .filter(Boolean);

                      const isTag = context.refType === 'tag';
                      const isMain = context.refType === 'branch' && context.refName === 'main';

                      const metadataTags = tags.length > 0
                        ? tags.map((tag) => `type=raw,value=${tag}`)
                        : [
                            'type=sha,format=long,prefix=sha-',
                            `type=raw,value=latest,enable=${isMain || isTag}`,
                            `type=raw,value=${context.refName},enable=${isTag}`,
                          ];

                      core.setOutput('tags', metadataTags.join('\n'));

            - name: Compute tags
              id: meta
              uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
              with:
                  images: ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}
                  tags: ${{ steps.meta-config.outputs.tags }}
                  labels: |
                      org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
                      org.opencontainers.image.revision=${{ github.sha }}

            - name: Build and push
              uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
              with:
                  context: ${{ inputs.context }}
                  file: ${{ inputs.dockerfile_path }}
                  target: ${{ inputs.target }}
                  platforms: ${{ inputs.platforms }}
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  build-args: ${{ inputs.build_args }}
                  cache-from: |
                      type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:buildcache-${{ inputs.target || 'default' }}
                      type=gha,scope=${{ inputs.image_name }}-${{ inputs.target || 'default' }}
                  cache-to: |
                      type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:buildcache-${{ inputs.target || 'default' }},mode=max
                      type=gha,mode=max,scope=${{ inputs.image_name }}-${{ inputs.target || 'default' }}
