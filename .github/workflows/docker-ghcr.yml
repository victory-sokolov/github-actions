name: Docker Build on GHCR

on:
    workflow_call:
        inputs:
            image_name:
                required: true
                type: string
            dockerfile_path:
                required: false
                type: string
                default: ./Dockerfile
            context:
                required: false
                type: string
                default: .
            build_args:
                required: false
                type: string
            target:
                required: false
                type: string
            tags:
                required: false
                type: string
                default: ""
            platforms:
                required: false
                type: string
                default: linux/amd64,linux/arm64

        secrets:
            registry_token:
                required: false

jobs:
    build:
        runs-on: ubuntu-latest
        timeout-minutes: 12
        permissions:
            contents: read
            packages: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - name: Set up QEMU
              uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

            - name: Log in to GHCR
              uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  # Use the passed secret if available, otherwise fallback to GITHUB_TOKEN
                  password: ${{ secrets.registry_token || secrets.GITHUB_TOKEN }}

            - name: Prepare metadata config
              id: meta-config
              uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
              env:
                  INPUT_TAGS: ${{ inputs.tags }}
              with:
                  script: |
                      const tags = (process.env.INPUT_TAGS || '')
                        .split(/\r?\n/)
                        .map((tag) => tag.trim())
                        .filter(Boolean);

                      const isTag = context.refType === 'tag';
                      const isMain = context.refType === 'branch' && context.refName === 'main';

                      const metadataTags = tags.length > 0
                        ? tags.map((tag) => `type=raw,value=${tag}`)
                        : [
                            'type=sha,format=long,prefix=sha-',
                            `type=raw,value=latest,enable=${isMain || isTag}`,
                            `type=raw,value=${context.refName},enable=${isTag}`,
                          ];

                      core.setOutput('tags', metadataTags.join('\n'));

            - name: Compute tags
              id: meta
              uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
              with:
                  images: ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}
                  tags: ${{ steps.meta-config.outputs.tags }}
                  labels: |
                      org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
                      org.opencontainers.image.revision=${{ github.sha }}

            - name: Build and push
              uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
              with:
                  context: ${{ inputs.context }}
                  file: ${{ inputs.dockerfile_path }}
                  target: ${{ inputs.target }}
                  platforms: ${{ inputs.platforms }}
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  build-args: ${{ inputs.build_args }}
                  cache-from: type=gha,scope=${{ inputs.image_name }}-${{ inputs.target || 'default' }}
                  cache-to: type=gha,mode=max,scope=${{ inputs.image_name }}-${{ inputs.target || 'default' }}
