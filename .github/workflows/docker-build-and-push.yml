name: Build and Push Docker Image to Docker Registry

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build_and_push:
    name: Docker Build and Push
    runs-on: ubuntu-latest

    env:
      DOCKER_REPOSITORY: 'victorysokolov/django-blog'
      SECRET_KEY: ${{ secrets.SECRET_KEY }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to DockerHub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - name: Set up Docker BuildX
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.DOCKER_REPOSITORY }}:${{ github.sha }}
          platforms: linux/amd64,linux/arm64
          secrets: |
            SECRET_KEY=${{ env.SECRET_KEY }}
          build-args: |
            SECRET_KEY=${{ env.SECRET_KEY }}

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}

      - name: Docker Scout analysis
        uses: docker/scout-action@cd72f264beff1cd72735de31148b9d3244a0234a # v1.21.0
        with:
          command: cves,recommendations,compare
          image: ${{ env.DOCKER_REPOSITORY }}:${{ github.sha }}
          to-latest: true
          ignore-base: true
          ignore-unchanged: true
          only-fixed: true
