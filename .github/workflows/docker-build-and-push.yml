name: Build and Push Docker Image to Docker Registry

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build_and_push:
    name: Docker Build and Push
    runs-on: ubuntu-latest

    env:
      DOCKER_REPOSITORY: 'victorysokolov/django-blog'
      SECRET_KEY: ${{ secrets.SECRET_KEY }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to DockerHub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - name: Set up Docker BuildX
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.DOCKER_REPOSITORY }}:${{ github.sha }}
          platforms: linux/amd64,linux/arm64
          secrets: |
            SECRET_KEY=${{ env.SECRET_KEY }}
          build-args: |
            SECRET_KEY=${{ env.SECRET_KEY }}

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}

      - name: Docker Scout analysis
        uses: docker/scout-action@2688993af7bafd6ba8c6a74ec652442be91dd82b # v1.23.1
        with:
          command: cves,recommendations,compare
          image: ${{ env.DOCKER_REPOSITORY }}:${{ github.sha }}
          to-latest: true
          ignore-base: true
          ignore-unchanged: true
          only-fixed: true
