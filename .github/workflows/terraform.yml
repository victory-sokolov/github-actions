name: Terraform Quality Checks
on:
  push:
    branches-ignore:
      - main
      - master
    paths:
      - '**/*.tf'
      - '**/*.tfvars'
      - '.terraform.lock.hcl'
  workflow_call:
    inputs:
      terraform_version:
        description: 'Terraform version to use'
        required: false
        type: string
        default: 'latest'
      working_directory:
        description: 'Directory containing Terraform code'
        required: false
        type: string
        default: '.'
      skip_trivy:
        description: 'Skip Trivy security scan'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  terraform-quality:
    name: Terraform Quality
    runs-on: ubuntu-latest
    env:
      TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Create Terraform plugin cache directory
        run: mkdir -p "$TF_PLUGIN_CACHE_DIR"
      - name: Cache Terraform plugins
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a # v6.3.0
      - name: tflint --init
        run: tflint --init
        working-directory: ${{ inputs.working_directory }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: tflint
        run: tflint --recursive
        working-directory: ${{ inputs.working_directory }}
      - name: terraform fmt
        uses: dflook/terraform-fmt-check@59168426e242f665bf7b70644d706224e665056a # v2.2.3
        with:
          path: ${{ inputs.working_directory }}
      - name: terraform validate
        uses: dflook/terraform-validate@4cef5d8a4b92bcd88486e41e22a42942a382c9d6 # v2.2.3
        with:
          path: ${{ inputs.working_directory }}
      - name: terraform plan
        uses: dflook/terraform-plan@7878bff63e2099cdc9be9a6f33cbbbf687f8f0fe # v2.2.3
        with:
          path: ${{ inputs.working_directory }}

  trivy-scan:
    name: Trivy Security Scan
    needs: terraform-quality
    if: ${{ !inputs.skip_trivy }}
    uses: ./.github/workflows/trivy-scan.yml
    with:
      scan-type: 'config'
      upload-sarif: true
    secrets:
      github-token: ${{ secrets.github-token || github.token }}
